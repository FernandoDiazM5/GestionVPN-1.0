server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Redirigir raíz al app ────────────────────────────────────────────────
    location = / {
        return 301 /GestionVPN-1.0/;
    }

    # ── SPA: React Router — cualquier ruta bajo /GestionVPN-1.0/ ────────────
    location /GestionVPN-1.0/ {
        try_files $uri $uri/ /GestionVPN-1.0/index.html;
    }

    # ── Assets estáticos con caché agresivo ─────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── Proxy inverso: /api/* → backend:3001/api/* ───────────────────────────
    # Esto evita problemas de CORS: el browser ve todo desde el mismo origen (puerto 8080)
    location /api/ {
        proxy_pass         http://backend:3001/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
    }

    # ── Seguridad básica ─────────────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";

    # Ocultar versión de nginx
    server_tokens off;
}
