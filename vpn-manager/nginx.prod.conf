# ── nginx producción — HTTPS + proxy /api + SSE ─────────────────────────────
#  El backend corre en network_mode: host → se alcanza vía host-gateway:3001
#  (definido como extra_hosts "backend:host-gateway" en docker-compose.prod.yml).

upstream backend {
    server backend:3001;
}

# HTTP → HTTPS
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name _;

    # Certificado (Let's Encrypt si hay dominio, o autofirmado para IP — ver §6)
    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    root /usr/share/nginx/html;
    index index.html;

    location = / {
        return 301 /GestionVPN-1.0/;
    }

    # SPA (React Router)
    location /GestionVPN-1.0/ {
        try_files $uri $uri/ /GestionVPN-1.0/index.html;
    }

    # Assets con caché agresivo
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Proxy inverso al backend
    location /api/ {
        proxy_pass         http://backend/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # ── CRÍTICO para SSE (/tunnel/events, node/scan-stream,
        #    ap-monitor/watch, node/provision/:id/progress, router/check) ──
        proxy_buffering    off;
        proxy_cache        off;
        proxy_set_header   Connection '';
        chunked_transfer_encoding off;

        proxy_read_timeout    300s;
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
    }

    # /metrics solo interno
    location /metrics {
        proxy_pass http://backend/metrics;
        allow 127.0.0.1;
        deny all;
    }

    add_header X-Frame-Options        "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff"    always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    server_tokens off;
    client_max_body_size 10M;
}
