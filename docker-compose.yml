version: '3.8'

services:

  # ── Backend Node.js (host network para acceder al túnel WireGuard) ──────────
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: vpn-backend
    restart: unless-stopped
    network_mode: host
    environment:
      PORT: "3001"
      DATA_DIR: "/data"
      CORS_ORIGINS: "http://localhost:8080,http://127.0.0.1:8080,http://134.199.212.232:8080"
    volumes:
      - vpn-data:/data

  # ── Frontend nginx (sirve el build de React + proxy /api → backend) ─────────
  frontend:
    build:
      context: ./vpn-manager
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ""
    container_name: vpn-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    extra_hosts:
      - "backend:host-gateway"
    networks:
      - vpn-net

volumes:
  vpn-data:
    driver: local

networks:
  vpn-net:
    driver: bridge
