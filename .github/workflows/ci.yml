# ──────────────────────────────────────────────────────────────────
#  CI — checks de sintaxis y tipos
#  Corre en cada push a dev/main y en cada pull request.
#
#  Backend  → node --check sobre puntos de entrada y rutas (sin tests
#             aún; F3 los introduce).
#  Frontend → tsc --noEmit + eslint en vpn-manager/.
#
#  Nota: usamos cache de npm para acelerar (~5-8x más rápido).
# ──────────────────────────────────────────────────────────────────
name: CI

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

# Cancela ejecuciones previas si llega un push nuevo a la misma branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend — sintaxis Node
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: node --check (puntos de entrada y rutas)
        run: |
          node --check index.js
          node --check auth.routes.js
          for f in routes/*.js; do
            node --check "$f"
          done
          for f in lib/*.js db/*.js db/repos/*.js middleware/*.js; do
            node --check "$f"
          done

  frontend:
    name: Frontend — tsc + eslint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vpn-manager
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: vpn-manager/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: ESLint
        run: npx eslint .

  # Job final agregador: facilita una sola "required check" en branch protection
  ci-ok:
    name: CI ✓
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Verificar resultados
        run: |
          if [ "${{ needs.backend.result }}" != "success" ] || [ "${{ needs.frontend.result }}" != "success" ]; then
            echo "CI falló: backend=${{ needs.backend.result }} frontend=${{ needs.frontend.result }}"
            exit 1
          fi
          echo "✅ Todos los jobs pasaron"
